<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mevert</title>
<style>
  body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f9f9f9;
      font-family: 'Arial', sans-serif;
  }

  .container {
      position: relative;
      width: 90%;
      max-width: 400px;
      height: 80%;
      max-height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
  }

  .card {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .card img {
      width: 100%;
      height: 60%;
      object-fit: cover;
  }

  .card .info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      height: 40%;
  }

  .card .info h2 {
      margin: 10px 0 5px;
      color: #333;
      font-size: 24px;
  }

  .card .info p {
      margin: 0;
      color: #777;
      font-size: 16px;
  }

  .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
  }

  button {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s ease;
  }

  .decline {
      background-color: #ff4d4d;
      color: #fff;
  }

  .decline:hover {
      background-color: #ff1a1a;
  }

  .send {
      background-color: #4CAF50;
      color: #fff;
  }

  .send:hover {
      background-color: #45a049;
  }

  #send-message {
    position: absolute;
    bottom: 10px;
    font-weight: bold;
    color: green;
    background: rgba(255,255,255,0.8);
    padding: 5px 10px;
    border-radius: 5px;
}
</style>
</head>
<body>

<!-- Home link -->
<form id="home" action="/api/profile" method="post"></form>
<a href="#" onclick="document.getElementById('home').submit();">HOME</a>
<br>{{user}}<br>

<div class="container">
  <div class="card" id="card">

    <img src="{{ profilePicture }}" alt="Profile Picture" class="profile-picture-img">
    <div class="info">
      <a href="{{ url_for('profile.other_profile', other_username=receiver_username) }}" style="text-decoration:none; color:inherit;">
      <h2 id="filter_name">{{filter_name}}</h2></a>
      <p id="filter_city">{{filter_city}}, {{filter_Country}}</p>
      <p id="filter_location">{{filter_location}}</p>
      <p id="filter_new_city">{{filter_new_city}}, {{filter_new_Country}}</p>
      <input type="hidden" id="receiver-username" value="{{ receiver_username }}">

      <div class="buttons">
        <!-- Decline button -->
        <button type="button" class="decline"
                onclick="buttonClick('{{ button1.city }}', '{{ button1.country }}', '{{ button1.api_url }}')">
                Decline
        </button>

        <!-- Send button (uses receiver_username from Flask) -->
        <button type="button" class="send"
                onclick="sendRequest('{{ receiver_username }}')">
                Send
        </button>
      </div>

      <!-- Success/Error message -->
      <p id="send-message"></p>
    </div>
  </div>
</div>

<script>
  // Decline button -> fetch new profile
  function buttonClick(city, country, apiUrl) {
      var formData = new FormData();
      formData.append('city', city);
      formData.append('country', country);

      fetch(apiUrl, {
          method: 'POST',
          body: formData
      })
      .then(response => response.text())
      .then(html => {
          var parser = new DOMParser();
          var doc = parser.parseFromString(html, 'text/html');

          document.getElementById('filter_name').textContent = doc.querySelector('#filter_name').textContent;
          document.getElementById('filter_city').textContent = doc.querySelector('#filter_city').textContent;
          document.getElementById('filter_location').textContent = doc.querySelector('#filter_location').textContent;
          document.getElementById('filter_new_city').textContent = doc.querySelector('#filter_new_city').textContent;
          document.querySelector('.profile-picture-img').src =
            doc.querySelector('.profile-picture-img').src;

          let newProfileLink = doc.querySelector(".info a").getAttribute("href");
          document.querySelector(".info a").setAttribute("href", newProfileLink);

          let newReceiver = doc.querySelector("#receiver-username").value;
          document.getElementById("receiver-username").value = newReceiver;


          // Clear old success message
          document.getElementById('send-message').textContent = "";
      })
      .catch(error => console.error('Error:', error));
  }

  // Send button -> send request to receiver
  function sendRequest() {
      let receiver = document.getElementById("receiver-username").value;
      var formData = new FormData();
      formData.append('username', receiver);

      fetch('/api/send_button_user_details', {
          method: 'POST',
          body: formData
      })
      .then(response => response.json())  // JSON response from Flask
      .then(data => {
          let messageBox = document.getElementById('send-message');
          messageBox.style.color = "green";
          messageBox.textContent = data.msg;
      })
      .catch(error => {
          console.error('Error:', error);
          let messageBox = document.getElementById('send-message');
          messageBox.style.color = "red";
          messageBox.textContent = "❌ Failed to send request.";
      });
  }
</script>
</body>
</html>
