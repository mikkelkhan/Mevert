<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Picture Upload</title>
    <style>
        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        .profile-picture {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #ddd;
            margin-bottom: 20px;
        }

        .profile-picture img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        .btn, .submit-btn {
            border: 2px solid #4CAF50;
            color: white;
            background-color: #4CAF50;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: inline-block;
            text-align: center;
        }

        .btn:hover, .submit-btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        .upload-btn-wrapper input[type="file"] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <form id="home" action="/api/profile" method="post"></form>
        <a href="#" onclick="document.getElementById('home').submit();">HOME</a>


        <form action="/api/profile/uploadPic" method="POST" enctype="multipart/form-data">
            <div class="form-actions">
                <div class="upload-btn-wrapper">
                    <button class="btn" type="button" onclick="document.getElementById('fileInput').click();">Choose Picture</button>
                    <input type="file" name="profilePicture" id="profilePicture" accept="image/*" required>
                </div>
                <button class="submit-btn" type="submit">Submit</button>
                <br>{{red}}<br>
            </div>
        </form>
    </div>
</body>
</html>
