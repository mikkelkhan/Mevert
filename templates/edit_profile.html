<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
        }

        input[type="text"], input[type="number"], input[type="file"] {
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #message {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
            <h2>Edit Profile</h2>
            <label for="name"></label>
            <input type="text" id="name" placeholder="Name" name="name" required>
            <label for="about"></label>
            <input type="text" id="about" placeholder="About Me" name="about" required>
            <label for="age"></label>
            <input type="number" id="age" placeholder="Age" name="age" required>
            <label for="city"></label>
            <input type="text" id="city" placeholder="City" name="city" required>
            <label for="city"></label>
            <input type="text" id="country" placeholder="Country" name="country" required>
            <label for="image"></label>
            <input type="file" id="image" placeholder="Upload Image" name="image" accept="image/*" required>
            <button type="submit">Submit</button>
        </form>
        <div id="message"></div>
    </div>
</body>
</html>
